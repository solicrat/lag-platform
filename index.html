    const spellIcons = {

        '🧊 Ice Wall': 'https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/abilities/invoker_ice_wall.png',

        '🔥 Sun Strike': 'https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/abilities/invoker_sun_strike.png',

    const allSpells = [

        { name: '👻 Ghost Walk', combo: ['q','q','w'] },

        { name: '🔥 Sun Strike', combo: ['e','e','e'] },
        { name: '🔮 Forge Spirit', combo: ['e','e','q'] },
        { name: '☄️ Chaos Meteor', combo: ['e','e','w'] },
        { name: '🌟 Deafening Blast', combo: ['q','w','e'] }

        el2.className = 'element ' + currentElements[1];

        let combo = currentElements.map(e => e[0]);

    function updateCurrentSpellUI() {
        let name = getCurrentSpellName();

    function checkInvoke() {

        let targetSpell = challenges[challengeIndex];
        if (!currentSpellObj) {
            messageSpan.textContent = '❌ Неизвестная комбинация!';

            animateCorrect();

                    bestTime = totalTime.toFixed(2);
                    localStorage.setItem('invokerBest', bestTime);
                    bestSpan.textContent = bestTime;
                    messageSpan.innerHTML = '🏆 НОВЫЙ РЕКОРД! ' + totalTime.toFixed(2) + ' сек! 🏆';
                }

                messageSpan.style.color = '#00ffaa';
                updateCurrentSpellUI();
            }
        } else {
            sounds.invoke.play();
            messageSpan.textContent = '❌ Нужно: ' + targetSpell.name + ', у тебя: ' + currentSpellObj.name;
            messageSpan.style.color = '#ff6b6b';
        }
    }
    function addElement(type) {
        if (!gameActive) {
            messageSpan.textContent = '⚠️ Нажми СТАРТ!';
            return;
        }
        currentElements.shift();
        currentElements.push(type);
        updateElementsUI();
        updateCurrentSpellUI();
        if (type === 'quas') sounds.quas.play();
        else if (type === 'wex') sounds.wex.play();
        else if (type === 'exort') sounds.exort.play();
    }
    function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if (gameActive && startTime) {
                timerSpan.textContent = ((Date.now() - startTime)/1000).toFixed(2);
            }
        }, 100);
    }
    function startGame() {
        challenges = genChallenges();
        challengeIndex = 0;

        updateCurrentSpellUI();
        displaySpellWithIcon(challenges[0].name, targetDisplay);

    function resetGame() {
        if (timerInterval) clearInterval(timerInterval);
        gameActive = false;
        startTime = null;
        currentElements = ['quas','quas','quas'];
        challengeIndex = 0;
        updateElementsUI();
        updateCurrentSpellUI();

        messageSpan.textContent = '🔄 Игра сброшена. Нажми СТАРТ!';
        messageSpan.style.color = '#64a4ff';
        sounds.click.play();
    }

    invokeBtn.onclick = checkInvoke;

    document.addEventListener('keydown', (e) => {
        let key = e.key.toLowerCase();
        if (['q','w','e','r'].includes(key)) e.preventDefault();

        else if (key === 'e') addElement('exort');
        else if (key === 'r') checkInvoke();
    });

    updateCurrentSpellUI();

    function shuffleArray(arr) {

        return { ...question, options: shuffledOptions, correct: newCorrectIndex };

                menuHtml = `
                    <li class="nav-item" data-page="home"><i class="fas fa-home"></i> ГЛАВНАЯ</li>
                    <li class="nav-item active" data-page="feedback"><i class="fas fa-envelope"></i> ФОРМА СВЯЗИ</li>
                `;
            }
            navMenu.innerHTML = menuHtml;
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', () => {
                    let page = item.dataset.page;
                    if (page === 'home') navigateTo('home');
                    else if (page === 'games') navigateTo('games');
                    else if (page === 'favorites') navigateTo('favorites');
                    else if (page === 'feedback') navigateTo('feedback');
                });
            });
        }

        function openGame(id) {
            const game = GAMES.find(g => g.id === id);
            if (!game) return;
            const overlay = document.createElement('div');
            overlay.className = 'game-page-overlay';
            overlay.innerHTML = `
                <div class="game-header">
                    <h2><img src="${game.icon}"> ${game.title}</h2>
                    <button class="back-btn" id="closeGameBtn"><i class="fas fa-arrow-left"></i> Назад</button>
                </div>
                <div class="game-iframe-container">
                    <iframe srcdoc="${escapeHtml(game.fullHTML)}" frameborder="0"></iframe>
                </div>
            `;
            document.body.appendChild(overlay);
            document.getElementById('closeGameBtn').onclick = () => overlay.remove();
        }

        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        // --- Страница отзывов ---
        function renderReviewsPage() {
            let reviews = loadReviews();
            let currentReviews = reviews[currentReviewGame] || [];
            let gamesList = [
                { id: 'invoker', name: 'Invoker', icon: 'https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react//heroes/invoker.png' },
                { id: 'naruto', name: 'Наруто', icon: 'https://avatars.mds.yandex.net/get-games/1892995/2a00000187186184a0e476c6ccc9a0d54447/default526x314' },
                { id: 'trap', name: 'Gimme the Trap', icon: 'https://i.ibb.co/RTyMhtbw/1-1-Photoroom.png' }
            ];
            let selectorHtml = `<div class="reviews-game-selector">`;
            gamesList.forEach(game => {
                selectorHtml += `
                    <div class="game-selector-card ${currentReviewGame === game.id ? 'active' : ''}" data-game="${game.id}">
                        <img src="${game.icon}"><div>${game.name}</div>
                    </div>
                `;
            });
            selectorHtml += `</div>`;
            let reviewsHtml = `<div class="reviews-list">`;
            currentReviews.forEach(rev => {
                reviewsHtml += `
                    <div class="review-item">
                        <div class="review-header"><span>${escapeHtml(rev.nickname)}</span><span>${rev.date}</span></div>
                        <div class="review-text">${escapeHtml(rev.text)}</div>
                    </div>
                `;
            });
            reviewsHtml += `</div>`;
            let addFormHtml = `
                <div class="add-review-form">
                    <h3>Оставить отзыв</h3>
                    <input type="text" id="reviewNick" placeholder="Ваш никнейм" maxlength="30">
                    <textarea id="reviewText" rows="3" placeholder="Ваш отзыв..."></textarea>
                    <button id="submitReviewBtn">Отправить отзыв</button>
                </div>
            `;
            mainContent.innerHTML = `
                <div class="page-content feedback-container">
                    <div class="feedback-buttons">
                        <button class="feedback-btn ${currentSubPage === 'reviews' ? 'active' : ''}" data-sub="reviews">ОТЗЫВЫ НА ИГРЫ</button>
                        <button class="feedback-btn ${currentSubPage === 'contact' ? 'active' : ''}" data-sub="contact">ОБРАТНАЯ СВЯЗЬ</button>
                    </div>
                    ${selectorHtml}
                    ${reviewsHtml}
                    ${addFormHtml}
                </div>
            `;
            document.querySelectorAll('.game-selector-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    currentReviewGame = card.dataset.game;
                    renderReviewsPage();
                });
            });
            document.getElementById('submitReviewBtn').addEventListener('click', () => {
                let nick = document.getElementById('reviewNick').value.trim();
                let text = document.getElementById('reviewText').value.trim();
                if (!nick || !text) {
                    alert('Заполните никнейм и текст отзыва');
                    return;
                }
                let newReview = {
                    nickname: nick,
                    date: new Date().toLocaleDateString('ru-RU'),
                    text: text
                };
                let reviews = loadReviews();
                if (!reviews[currentReviewGame]) reviews[currentReviewGame] = [];
                reviews[currentReviewGame].push(newReview);
                saveReviews(reviews);
                renderReviewsPage();
            });
            // Повторная привязка кнопок переключения между отзывами и обратной связью
            document.querySelectorAll('.feedback-btn').forEach(btn => {
                btn.onclick = () => {
                    currentSubPage = btn.dataset.sub;
                    renderFeedbackPage();
                };
            });

        }

        // --- Страница обратной связи ---
        function renderContactPage() {
            mainContent.innerHTML = `
                <div class="page-content feedback-container">
                    <div class="feedback-buttons">
                        <button class="feedback-btn ${currentSubPage === 'reviews' ? 'active' : ''}" data-sub="reviews">ОТЗЫВЫ НА ИГРЫ</button>
                        <button class="feedback-btn ${currentSubPage === 'contact' ? 'active' : ''}" data-sub="contact">ОБРАТНАЯ СВЯЗЬ</button>
                    </div>
                    <div class="contact-form">
                        <h3>Свяжитесь с нами</h3>
                        <input type="text" id="contactNick" placeholder="Никнейм">
                        <input type="email" id="contactEmail" placeholder="Эл. почта">
                        <input type="text" id="contactSubject" placeholder="Тема обращения">
                        <textarea id="contactMessage" rows="4" placeholder="Ваше сообщение"></textarea>
                        <button id="sendContactBtn">Отправить</button>
                        <div id="contactSuccess" style="display:none;" class="success-toast">✓ Ваше сообщение успешно отправлено</div>
                    </div>
                </div>
            `;
            document.getElementById('sendContactBtn').addEventListener('click', () => {
                let nick = document.getElementById('contactNick').value;
                let email = document.getElementById('contactEmail').value;
                let subject = document.getElementById('contactSubject').value;
                let message = document.getElementById('contactMessage').value;
                if (!nick || !email || !subject || !message) {
                    alert('Пожалуйста, заполните все поля');
                    return;
                }

                const templateParams = {
                    user_name: nick,
                    user_email: email,
                    user_subject: subject,
                    user_message: message
                };
                emailjs.send
                emailjs.send('service_50qm9cw', 'template_503n4tc', templateParams)
                    .then(() => {
                        document.getElementById('contactNick').value = '';
                        document.getElementById('contactEmail').value = '';
                        document.getElementById('contactSubject').value = '';
                        document.getElementById('contactMessage').value = '';
                        let successDiv = document.getElementById('contactSuccess');
                        successDiv.style.display = 'block';
                        setTimeout(() => { successDiv.style.display = 'none'; }, 3000);
                    })
                    .catch((error) => {
                        // ПОКАЗЫВАЕМ ОШИБКУ ПРЯМО НА СТРАНИЦЕ
                        let errorDiv = document.getElementById('contactSuccess');
                        errorDiv.style.backgroundColor = '#8b0000';
                        errorDiv.style.display = 'block';
                        errorDiv.innerHTML = '❌ Ошибка: ' + (error.text || error.message || 'Неизвестная ошибка. Проверь Public Key и настройки EmailJS.');
                        setTimeout(() => { errorDiv.style.display = 'none'; }, 5000);
                    });
            });

            document.querySelectorAll('.feedback-btn').forEach(btn => {
                btn.onclick = () => {
                    currentSubPage = btn.dataset.sub;
                    renderFeedbackPage();
                };
            });
        }

        function renderFeedbackPage() {
            if (currentSubPage === 'reviews') renderReviewsPage();
            else if (currentSubPage === 'contact') renderContactPage();
            else renderReviewsPage();
            document.querySelectorAll('.feedback-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    currentSubPage = btn.dataset.sub;
                    renderFeedbackPage();
                });
            });
        }

        // --- Основные страницы ---
        function renderGamesGrid(containerId) {
            const grid = document.getElementById(containerId);
            if (!grid) return;
            grid.innerHTML = GAMES.map(g => `
                <div class="game-card" data-id="${g.id}">
                    <div class="game-icon-wrapper">
                        <img class="game-icon" src="${g.icon}">
                        <div class="game-hover-overlay">
                            <button class="hover-fav-btn ${isFavorite(g.id) ? 'active' : ''}" data-id="${g.id}">
                                <i class="fas fa-heart"></i>
                            </button>
                        </div>
                    </div>
                    <div class="game-info">
                        <div class="game-title">${g.title}</div>
                        <div class="game-category">${g.category}</div>
                        <div class="game-description">${g.description.substring(0, 80)}...</div>
                    </div>
                </div>
            `).join('');
            document.querySelectorAll(`#${containerId} .game-card`).forEach(card => {
                card.addEventListener('click', (e) => {
                    if (e.target.closest('.hover-fav-btn')) return;
                    openGame(card.dataset.id);
                });
            });
            document.querySelectorAll(`#${containerId} .hover-fav-btn`).forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    toggleFavorite(btn.dataset.id);
                    renderCurrentPage();
                    renderFavoritesSidebar();
                });
            });
        }

        function renderHomePage() {
            mainContent.innerHTML = `
                <div class="page-content">
                    <div class="hero">
                        <h1>LAG</h1>
                        <p>LAG — туса для сенпая и его кун-тян. Шалом, бро! Гикай с кавайных лутов, чиляй, керри, хлебай рамэн и никаких бака-фризов. Погнали, сасэгэ? Датебаё! 🎮🔥</p>
                        <div class="hero-badge"><i class="fas fa-bolt"></i> 🍜  рамэн-party  🍜</div>
                    </div>
                    <div class="section-header"><h2>Популярные игры</h2><span style="color:#ff6b6b">🔥 Хит</span></div>
                    <div class="games-grid" id="homeGrid"></div>
                </div>
            `;
            renderGamesGrid('homeGrid');
        }

        function renderGamesOnlyPage() {
            mainContent.innerHTML = `
                <div class="page-content">
                    <div class="section-header"><h2><i class="fas fa-dice-d6"></i> Все игры</h2><span>${GAMES.length} игры</span></div>
                    <div class="games-grid" id="allGamesGrid"></div>
                </div>
            `;
            renderGamesGrid('allGamesGrid');
        }

        function renderFavoritesPage() {
            const favs = GAMES.filter(g => favorites.includes(g.id));
            mainContent.innerHTML = `
                <div class="page-content">
                    <div class="section-header"><h2><i class="fas fa-heart"></i> Избранное</h2><span>${favs.length} игр</span></div>
                    <div class="games-grid" id="favGrid"></div>
                </div>
            `;
            const grid = document.getElementById('favGrid');
            if (favs.length === 0) {
                grid.innerHTML = '<div style="text-align:center;padding:60px"><i class="far fa-heart" style="font-size:3rem;color:#ff6b6b"></i><p>Добавь игры в избранное сердечком</p></div>';
                return;
            }
            grid.innerHTML = favs.map(g => `
                <div class="game-card" data-id="${g.id}">
                    <div class="game-icon-wrapper">
                        <img class="game-icon" src="${g.icon}">
                        <div class="game-hover-overlay">
                            <button class="hover-fav-btn active" data-id="${g.id}"><i class="fas fa-heart"></i></button>
                        </div>
                    </div>
                    <div class="game-info">
                        <div class="game-title">${g.title}</div>
                        <div class="game-category">${g.category}</div>
                        <div class="game-description">${g.description.substring(0, 80)}...</div>
                    </div>
                </div>
            `).join('');
            document.querySelectorAll('#favGrid .game-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    if (e.target.closest('.hover-fav-btn')) return;
                    openGame(card.dataset.id);
                });
            });
            document.querySelectorAll('#favGrid .hover-fav-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    toggleFavorite(btn.dataset.id);
                    renderFavoritesPage();
                    renderFavoritesSidebar();
                    if (currentPage === 'games') renderGamesOnlyPage();
                    if (currentPage === 'home') renderHomePage();
                });
            });
        }

        function renderCurrentPage() {
            renderSidebarForPage();
            if (currentPage === 'home') renderHomePage();
            else if (currentPage === 'games') renderGamesOnlyPage();
            else if (currentPage === 'favorites') renderFavoritesPage();
            else if (currentPage === 'feedback') renderFeedbackPage();
        }

        function navigateTo(page) {
            currentPage = page;
            if (page === 'feedback') {
                currentSubPage = 'reviews';
            }
            renderCurrentPage();
            if (window.innerWidth <= 900) sidebarEl.classList.remove('open');
        }

        footerFeedbackBtn.addEventListener('click', () => navigateTo('feedback'));

        renderFavoritesSidebar();
        renderCurrentPage();
        menuToggle.addEventListener('click', () => sidebarEl.classList.toggle('open'));
    </script>
</body>

</html>
